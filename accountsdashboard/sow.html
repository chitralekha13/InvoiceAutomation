<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOW Dashboard - Accounts Portal</title>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background: #1e3a5f;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { color: white; font-size: 20px; font-weight: 600; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .btn-back:hover { background: rgba(255,255,255,0.3); color: white; }
        .btn-upload {
            background: #107c10;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-upload:hover { background: #0e6b0e; }
        .btn-upload:disabled { background: #90b8d8; cursor: not-allowed; }
        input[type="file"] { display: none; }
        .main { padding: 24px; max-width: 1800px; margin: 0 auto; }
        .toolbar { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
        .table-wrap { background: white; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background: #f0f4f8; font-weight: 600; color: #333; }
        tr:hover { background: #fafafa; }
        .empty-msg { padding: 40px; text-align: center; color: #666; }
        .error-msg { padding: 16px; background: #fff0f0; color: #c00; border-radius: 4px; margin-bottom: 16px; }
        .success-msg { padding: 16px; background: #f0fff0; color: #0a0; border-radius: 4px; margin-bottom: 16px; }
        .user-info { color: rgba(255,255,255,0.9); font-size: 14px; display: flex; align-items: center; gap: 12px; }
        .btn-logout {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.6);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }
        
        a.pdf-link { color: #0078d4; text-decoration: none; }
        a.pdf-link:hover { text-decoration: underline; }
        .btn-view {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-view:hover {
            background: #218838;
        }
        .btn-toggle-edit {
            background: #0078d4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 12px;
        }
        .btn-toggle-edit.disable {
            background: #d13438;
        }
        .sow-editable.sow-edit-enabled {
            background: #fffceb;
            cursor: text;
        }
        .btn-delete {
            background: #d83b01;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: none;
        }
        .btn-delete.show { display: inline-block; }
        .btn-delete:hover { background: #a52d01; }

        [data-tooltip] { position: relative; }
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 1000;
            margin-bottom: 6px;
        }
        .btn-toggle-edit.icon-btn:hover::after {
            bottom: auto;
            top: 100%;
            margin-bottom: 0;
            margin-top: 6px;
        }
        .btn-back:hover::after {
            bottom: auto;
            top: 100%;
            margin-bottom: 0;
            margin-top: 6px;
        }


        .btn-logout.icon-btn { padding: 8px 12px; }
        .btn-logout.icon-btn i { font-size: 16px; }
        .btn-logout.icon-btn::after { bottom: auto; top: 100%; margin-bottom: 0; margin-top: 6px;}
        .btn-upload i, .btn-back i { margin-right: 6px; }

        .btn-toggle-edit.icon-btn {
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }
        .btn-toggle-edit.icon-btn i { font-size: 14px; }

        .btn-view.icon-btn {
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        .btn-view.icon-btn i { font-size: 14px; }


    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="dashboard.html" class="btn-back icon-btn" data-tooltip="Home"><i class="fas fa-home"></i></a>
            <span class="header-title">SOW Dashboard</span>
        </div>
        <div class="user-info">
            <span id="userName" data-tooltip="Logged in user"></span>
            <button type="button" class="btn-logout icon-btn" onclick="logout()" data-tooltip="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <div class="main">
        <div id="messageArea"></div>
        <div class="toolbar">
            <button type="button" class="btn-upload" id="btnUploadSow" data-tooltip="Upload SOW"><i class="fas fa-upload"></i> Upload SOW</button>
            <input type="file" id="sowFileInput" accept=".pdf,.png,.jpg,.jpeg" />
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Resource name</th>
                        <th>Consultancy name</th>
                        <th>SOW start date</th>
                        <th>SOW end date</th>
                        <th>Net terms</th>
                        <th>Max SOW hours</th>
                        <th>Rate per hour</th>
                        <th>Project role</th>
                        <th>SOW project duration</th>
                        <th>Document</th>
                        <th>
                            <button type="button" class="btn-toggle-edit icon-btn" id="btnSowToggleEdit" data-tooltip="Toggle Edit"><i class="fas fa-edit"></i></button>
                        </th>
                    </tr>
                </thead>
                <tbody id="sowTableBody">
                    <tr><td colspan="11" class="empty-msg">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let API_BASE = (window.APP_CONFIG && window.APP_CONFIG.apiBaseUrl) || '';
        API_BASE = (API_BASE || '').trim().replace(/\/+$/, '');
        if (API_BASE && !/^https?:\/\//i.test(API_BASE)) API_BASE = 'https://' + API_BASE;
        if (API_BASE && API_BASE.startsWith('http://')) API_BASE = 'https://' + API_BASE.slice(7);

        const userEmail = sessionStorage.getItem('userEmail');
        const userName = sessionStorage.getItem('userName');
        const loggedIn = sessionStorage.getItem('loggedIn');
        const accessToken = sessionStorage.getItem('accessToken');
        let sowEditMode = false;

        if (!loggedIn && !userName) {
            window.location.href = 'index.html';
        }
        document.getElementById('userName').textContent = userName || userEmail || '';

        function showMessage(text, isError) {
            const el = document.getElementById('messageArea');
            el.className = isError ? 'error-msg' : 'success-msg';
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 6000);
        }

        async function loadSows() {
            const tbody = document.getElementById('sowTableBody');
            tbody.innerHTML = '<tr><td colspan="11" class="empty-msg">Loading…</td></tr>';
            try {
                const headers = {};
                if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
                const res = await fetch(API_BASE + '/api/sow/list', { method: 'GET', headers });
                const data = await res.json().catch(function() { return { sows: [] }; });
                const sows = data.sows || [];
                if (sows.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" class="empty-msg">No SOWs yet. Use "Upload SOW" to add one.</td></tr>';
                    return;
                }
                tbody.innerHTML = sows.map(function(s) {
                    const sowId = (s.sow_id || '').replace(/"/g, '&quot;');
                    const canView = !!s.pdf_url;
                    const doc = canView
                            ? '<button type="button" class="btn-view icon-btn" data-url="' + s.pdf_url + '" data-name="' + (s.doc_name || 'Document').replace(/"/g, '&quot;') + '" data-tooltip="View Document"><i class="fas fa-eye"></i></button>'
                        : (s.doc_name || '—');
                    return '<tr>' +
                        '<td class="sow-editable" data-field="resource_name" data-id="' + sowId + '">' + (s.resource_name || '—') + '</td>' +
                        '<td class="sow-editable" data-field="consultancy_name" data-id="' + sowId + '">' + (s.consultancy_name || '—') + '</td>' +
                        '<td class="sow-editable" data-field="sow_start_date" data-id="' + sowId + '">' + (s.sow_start_date || '—') + '</td>' +
                        '<td class="sow-editable" data-field="sow_end_date" data-id="' + sowId + '">' + (s.sow_end_date || '—') + '</td>' +
                        '<td class="sow-editable" data-field="net_terms" data-id="' + sowId + '">' + (s.net_terms || '—') + '</td>' +
                        '<td class="sow-editable" data-field="max_sow_hours" data-id="' + sowId + '">' + (s.max_sow_hours != null ? s.max_sow_hours : '—') + '</td>' +
                        '<td class="sow-editable" data-field="rate_per_hour" data-id="' + sowId + '">' + (s.rate_per_hour != null ? s.rate_per_hour : '—') + '</td>' +
                        '<td class="sow-editable" data-field="project_role" data-id="' + sowId + '">' + (s.project_role || '—') + '</td>' +
                        '<td class="sow-editable" data-field="sow_project_duration" data-id="' + sowId + '">' + (s.sow_project_duration || '—') + '</td>' +
                        '<td>' + doc + '</td>' +
                        '<td><button type="button" class="btn-delete" data-sow-id="' + sowId + '">Delete</button></td>' +
                        '</tr>';
                }).join('');
                tbody.querySelectorAll('.btn-delete').forEach(function(btn) {
                    btn.addEventListener('click', function() { deleteSow(this.getAttribute('data-sow-id')); });
                });
                tbody.querySelectorAll('.btn-view').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        const url = this.getAttribute('data-url');
                        if (url) window.open(url, '_blank');
                    });
                });
                if (sowEditMode) {
                    document.querySelectorAll('.btn-delete').forEach(function(btn) { btn.classList.add('show'); });
                }
                bindSowEditableCells();
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="11" class="empty-msg">Failed to load: ' + e.message + '</td></tr>';
            }
        }

        document.getElementById('btnUploadSow').onclick = function() {
            document.getElementById('sowFileInput').click();
        };
        document.getElementById('sowFileInput').onchange = async function() {
            const file = this.files && this.files[0];
            if (!file) return;
            const btn = document.getElementById('btnUploadSow');
            btn.disabled = true;
            try {
                const form = new FormData();
                form.append('file', file);
                const headers = {};
                if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
                const res = await fetch(API_BASE + '/api/sow/upload', {
                    method: 'POST',
                    headers: headers,
                    body: form
                });
                const data = await res.json().catch(function() { return {}; });
                if (!res.ok) {
                    showMessage(data.error || data.detail || 'Upload failed', true);
                    return;
                }
                showMessage('SOW uploaded and processed successfully.', false);
                loadSows();
            } catch (e) {
                showMessage('Upload failed: ' + e.message, true);
            } finally {
                btn.disabled = false;
                this.value = '';
            }
        };

        function toggleSowEditMode() {
            sowEditMode = !sowEditMode;
            const btn = document.getElementById('btnSowToggleEdit');
            const cells = document.querySelectorAll('.sow-editable');
            if (sowEditMode) {
                btn.innerHTML = '<i class="fas fa-lock"></i>'; 
                btn.setAttribute('data-tooltip', 'Disable Edit');
                btn.classList.add('disable');
                cells.forEach(function(c) { c.classList.add('sow-edit-enabled'); });
                document.querySelectorAll('.btn-delete').forEach(function(btn) { btn.classList.add('show'); });
            } else {
                btn.innerHTML = '<i class="fas fa-edit"></i>';
                btn.setAttribute('data-tooltip', 'Enable Edit');
                btn.classList.remove('disable');
                cells.forEach(function(c) { c.classList.remove('sow-edit-enabled'); });
                document.querySelectorAll('.btn-delete').forEach(function(btn) { btn.classList.remove('show'); });
            }
        }

        function bindSowEditableCells() {
            document.querySelectorAll('.sow-editable').forEach(function(cell) {
                cell.addEventListener('click', function() {
                    if (!sowEditMode) return;
                    const field = this.dataset.field;
                    const sowId = this.dataset.id;
                    if (!field || !sowId) return;
                    const original = this.textContent.trim();
                    const current = original === '—' ? '' : original;
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = current;
                    input.style.cssText = 'width:100%;padding:4px;font-size:inherit;border:2px solid #0078d4;';
                    this.textContent = '';
                    this.appendChild(input);
                    input.focus();
                    const cellRef = this;
                    function cancel() {
                        cellRef.textContent = original;
                        if (sowEditMode) cellRef.classList.add('sow-edit-enabled');
                    }
                    input.addEventListener('blur', function() {
                        saveSowEdit(sowId, field, input.value, cellRef, original);
                    });
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') input.blur();
                        if (e.key === 'Escape') cancel();
                    });
                });
            });
        }

        async function saveSowEdit(sowId, field, value, cell, originalValue) {
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
                const res = await fetch(API_BASE + '/api/sow/' + encodeURIComponent(sowId) + '/update', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ field: field, value: value })
                });
                const data = await res.json().catch(function() { return {}; });
                if (!res.ok || data.error) {
                    cell.textContent = originalValue;
                    showMessage(data.error || 'Save failed', true);
                    return;
                }
                cell.textContent = value || '—';
                if (sowEditMode) cell.classList.add('sow-edit-enabled');
                showMessage('SOW updated.', false);
            } catch (e) {
                cell.textContent = originalValue;
                showMessage('Save failed: ' + e.message, true);
            }
        }

        document.getElementById('btnSowToggleEdit').onclick = toggleSowEditMode;

        async function deleteSow(sowId) {
            if (!sowId) return;
            if (!confirm('Delete this SOW? This cannot be undone.')) return;
            try {
                const headers = {};
                if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
                const res = await fetch(API_BASE + '/api/sow/' + encodeURIComponent(sowId), { method: 'DELETE', headers });
                const data = await res.json().catch(function() { return {}; });
                if (!res.ok) {
                    showMessage(data.error || 'Delete failed', true);
                    return;
                }
                showMessage('SOW deleted.', false);
                loadSows();
            } catch (e) {
                showMessage('Delete failed: ' + e.message, true);
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        loadSows();
    </script>
</body>
</html>
